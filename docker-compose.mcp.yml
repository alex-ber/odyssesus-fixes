services:
  odysseus:
    volumes:
      # Mount to ROOT (/init-mcp.sh) so the script does not get caught
      # in the `chown` cycle inside the original entrypoint.sh
      - ./init-mcp.sh:/init-mcp.sh:ro
    
    # Clean command: directly invoke bash, pass our script to it,
    # and everything else is forwarded into the script as arguments ($@)
    command: ["bash", "/init-mcp.sh", "uvicorn", "app:app", "--host", "0.0.0.0", "--port", "7000"]
